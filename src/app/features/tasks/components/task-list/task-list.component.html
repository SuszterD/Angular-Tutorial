<input
    type="text"
    [(ngModel)]="newTask"
    placeholder="Új feladat"
/>

<button (click)="addTask()">Hozzáad</button>

<ul>
    <li *ngFor="let task of (tasks$ | async)?.tasks">
        <input
            type="checkbox"
            [checked]="task.completed"
            (change)="toggleTask(task.id)"
        />
        <span [class.completed]="task.completed">
            {{task.title}}
        </span> 

        <button (click)="deleteTask(task.id)">
            Töröl
        </button>
    </li>
</ul>

<button (click)="logTasks()">Console log</button>
<app-task-stats [tasks]="(tasks$ | async)?.tasks || []"></app-task-stats>
